main: cz.hashiri.harshlands.HLPlugin
name: ${project.parent.name}
version: ${project.parent.version}
author: Hashiri_
description: ${project.parent.description}
website: ${project.parent.url}
api-version: 1.17
softdepend: [PlaceholderAPI, RealisticSeasons, WorldGuard, AuraSkills]
load: STARTUP

commands:
  Harshlands:
    description: The home command of the Harshlands plugin
    usage: /harshlands
    aliases: [hl]

permissions:
  harshlands.iceandfire.resistance.sirenvisual:
    description: Prevents the player's screen from changing due to sirens
    default: false
  harshlands.iceandfire.resistance.*:
    description: Wildcard permission
    default: false
    children:
      harshlands.iceandfire.resistance.sirenvisual: true
  harshlands.toughasnails.resistance.cold.*:
    description: Prevents the player from getting cold
    default: false
    children:
      harshlands.toughasnails.resistance.cold.damage: true
      harshlands.toughasnails.resistance.cold.potioneffects: true
      harshlands.toughasnails.resistance.cold.visual: true
      harshlands.toughasnails.resistance.cold.breath: true
  harshlands.toughasnails.resistance.cold.damage:
    description: Prevents the player from taking damage due to hypothermia
    default: false
  harshlands.toughasnails.resistance.cold.potioneffects:
    description: Prevents the player from receiving status effects due to hypothermia
    default: false
  harshlands.toughasnails.resistance.cold.visual:
    description: Prevents the player's screen from freezing due to hypothermia
    default: false
  harshlands.toughasnails.resistance.cold.breath:
    description: Prevents the player from breathing out cold air
    default: false
  harshlands.toughasnails.resistance.hot.*:
    description: Prevents the player from getting hot
    default: false
    children:
      harshlands.toughasnails.resistance.hot.sweat: true
      harshlands.toughasnails.resistance.hot.damage: true
      harshlands.toughasnails.resistance.hot.combustion: true
      harshlands.toughasnails.resistance.hot.potioneffects: true
      harshlands.toughasnails.resistance.hot.visual: true
  harshlands.toughasnails.resistance.hot.sweat:
    description: Prevents the player from sweating
    default: false
  harshlands.toughasnails.resistance.hot.damage:
    description: Prevents the player from taking damage due to hyperthermia
    default: false
  harshlands.toughasnails.resistance.hot.combustion:
    description: Prevents the player from being ignited due to hyperthermia
    default: false
  harshlands.toughasnails.resistance.hot.potioneffects:
    description: Prevents the player from receiving status effects due to hyperthermia
    default: false
  harshlands.toughasnails.resistance.hot.visual:
    description: Prevents the player's screen from burning due to hypothermia
    default: false
  harshlands.toughasnails.resistance.thirst.*:
    description: Prevents the player from getting hot
    default: false
    children:
      harshlands.toughasnails.resistance.thirst.damage: true
      harshlands.toughasnails.resistance.thirst.potioneffects: true
      harshlands.toughasnails.resistance.thirst.visual: true
  harshlands.toughasnails.resistance.thirst:
    description: Prevents the player from getting thirsty
    default: false
  harshlands.toughasnails.resistance.thirst.damage:
    description: Prevents the player from taking damage due to dehydration
    default: false
  harshlands.toughasnails.resistance.thirst.potioneffects:
    description: Prevents the player from receiving status effects due to dehydration
    default: false
  harshlands.toughasnails.resistance.thirst.visual:
    description: Prevents the player's screen from changing due to dehydration
    default: false
  harshlands.toughasnails.resistance.parasite.*:
    description: Prevents the player from getting hot
    default: false
    children:
      harshlands.toughasnails.resistance.parasite.damage: true
      harshlands.toughasnails.resistance.parasite.potioneffects: true
  harshlands.toughasnails.resistance.parasite:
    description: Prevents the player from getting parasites
    default: false
  harshlands.toughasnails.resistance.parasite.damage:
    description: Prevents the player from taking damage from parasites
    default: false
  harshlands.toughasnails.resistance.parasite.potioneffects:
    description: Prevents the player from receiving status effects due to parasites
    default: false
  harshlands.toughasnails.resistance.*:
    description: Wildcard permission
    default: false
    children:
      harshlands.toughasnails.resistance.cold.*: true
      harshlands.toughasnails.resistance.hot.*: true
      harshlands.toughasnails.resistance.thirst.*: true
      harshlands.toughasnails.resistance.parasite.*: true
  harshlands.command.give:
    description: Allows users to give themselves items from the plugin
    default: op
  harshlands.command.spawnitem:
    description: Allows users to spawn items from the plugin
    default: op
  harshlands.command.summon:
    description: Allows users to spawn mobs from the plugin
    default: op
  harshlands.command.reload:
    description: Allows users to reload the plugin
    default: op
  harshlands.command.thirst:
    description: Allows users to change the thirst of other players
    default: op
  harshlands.command.temperature:
    description: Allows users to change the temperature of other players
    default: op
  harshlands.command.resetitem:
    description: Allows users to reset their item to use in recipes
    default: op
  harshlands.command.updateitem:
    description: Allows users to update their item
    default: op
  harshlands.command.help:
    description: Allows users to access the help command
    default: true
  harshlands.command.version:
    description: Allows users to access the plugin version
    default: true
  harshlands.command.comfort:
    description: Allows checking comfort score at current location
    default: true
  harshlands.command.fear:
    description: Allows checking your own fear level
    default: true
  harshlands.command.fear.others:
    description: Allows checking other players' fear levels
    default: op
  harshlands.command.fear.set:
    description: Allows setting another player's fear level
    default: op
  harshlands.command.debug:
    description: Allows using /hl debug on yourself
    default: true
  harshlands.command.debug.others:
    description: Allows using /hl debug targeting other players
    default: op
  harshlands.command.nutrition:
    description: View your nutrition status
    default: true
  harshlands.command.nutrition.others:
    description: View other players' nutrition status
    default: op
  harshlands.command.nutrition.set:
    description: Set a player's nutrition values
    default: op
  harshlands.command.nutrition.reset:
    description: Reset a player's nutrition to defaults
    default: op
  harshlands.comfort.cabinfever.bypass:
    description: Exempts a player from cabin fever accumulation
    default: false
  harshlands.admin.hints:
    description: Allows resetting another player's progressive-hint state
    default: op
  harshlands.command.hints.reset.self:
    description: Allows resetting your own progressive-hint state
    default: true
  harshlands.command.*:
    description: Wildcard permission
    default: op
    children:
      harshlands.command.give: true
      harshlands.command.spawnitem: true
      harshlands.command.summon: true
      harshlands.command.reload: true
      harshlands.command.thirst: true
      harshlands.command.temperature: true
      harshlands.command.resetitem: true
      harshlands.command.updateitem: true
      harshlands.command.help: true
      harshlands.command.version: true
      harshlands.command.comfort: true
      harshlands.command.fear: true
      harshlands.command.fear.others: true
      harshlands.command.fear.set: true
      harshlands.command.debug: true
      harshlands.command.debug.others: true
      harshlands.command.nutrition: true
      harshlands.command.nutrition.others: true
      harshlands.command.nutrition.set: true
      harshlands.command.nutrition.reset: true
      harshlands.admin.hints: true
      harshlands.command.hints.reset.self: true

