# ============================================================
# Harshlands — Comfort & Resting System
# ============================================================
# Inspired by Valheim's comfort mechanic.
# Sleeping in a bed near comfort-providing blocks/entities
# grants temporary buff effects based on the comfort score.
# ============================================================

ConfigId: "1.2.16"

# ── General ──────────────────────────────────────────────────
Initialize:
  Enabled: true
Shutdown:
  Enabled: true

# Radius (in blocks) around the bed to scan for comfort items.
SearchRadius: 8

# PAPI cache duration in seconds (per-player).
CacheSeconds: 5

# ── Categories ───────────────────────────────────────────────
# Each category contributes its Points for every match found, with
# diminishing returns when DiminishingReturns.Enabled is true (see below).
#
# Material names use Bukkit Material enum names (1.21).
# EntityType names use Bukkit EntityType enum names.
#
# Special flags per category:
#   RequireLit   — block must be lit (Campfire / Candle)
#   PrefixMatch  — match material names starting with given prefix
#                  (used for flower pots: POTTED_*)
Categories:
  Bed:
    Points: 3
    Materials:
      - WHITE_BED
      - ORANGE_BED
      - MAGENTA_BED
      - LIGHT_BLUE_BED
      - YELLOW_BED
      - LIME_BED
      - PINK_BED
      - GRAY_BED
      - LIGHT_GRAY_BED
      - CYAN_BED
      - PURPLE_BED
      - BLUE_BED
      - BROWN_BED
      - GREEN_BED
      - RED_BED
      - BLACK_BED
  Carpet:
    Points: 1
    Materials:
      - WHITE_CARPET
      - ORANGE_CARPET
      - MAGENTA_CARPET
      - LIGHT_BLUE_CARPET
      - YELLOW_CARPET
      - LIME_CARPET
      - PINK_CARPET
      - GRAY_CARPET
      - LIGHT_GRAY_CARPET
      - CYAN_CARPET
      - PURPLE_CARPET
      - BLUE_CARPET
      - BROWN_CARPET
      - GREEN_CARPET
      - RED_CARPET
      - BLACK_CARPET
  Banner:
    Points: 1
    Materials:
      - WHITE_BANNER
      - ORANGE_BANNER
      - MAGENTA_BANNER
      - LIGHT_BLUE_BANNER
      - YELLOW_BANNER
      - LIME_BANNER
      - PINK_BANNER
      - GRAY_BANNER
      - LIGHT_GRAY_BANNER
      - CYAN_BANNER
      - PURPLE_BANNER
      - BLUE_BANNER
      - BROWN_BANNER
      - GREEN_BANNER
      - RED_BANNER
      - BLACK_BANNER
      - WHITE_WALL_BANNER
      - ORANGE_WALL_BANNER
      - MAGENTA_WALL_BANNER
      - LIGHT_BLUE_WALL_BANNER
      - YELLOW_WALL_BANNER
      - LIME_WALL_BANNER
      - PINK_WALL_BANNER
      - GRAY_WALL_BANNER
      - LIGHT_GRAY_WALL_BANNER
      - CYAN_WALL_BANNER
      - PURPLE_WALL_BANNER
      - BLUE_WALL_BANNER
      - BROWN_WALL_BANNER
      - GREEN_WALL_BANNER
      - RED_WALL_BANNER
      - BLACK_WALL_BANNER
  Campfire:
    Points: 3
    RequireLit: true
    Materials:
      - CAMPFIRE
      - SOUL_CAMPFIRE
  Candle:
    Points: 1
    RequireLit: true
    Materials:
      - CANDLE
      - WHITE_CANDLE
      - ORANGE_CANDLE
      - MAGENTA_CANDLE
      - LIGHT_BLUE_CANDLE
      - YELLOW_CANDLE
      - LIME_CANDLE
      - PINK_CANDLE
      - GRAY_CANDLE
      - LIGHT_GRAY_CANDLE
      - CYAN_CANDLE
      - PURPLE_CANDLE
      - BLUE_CANDLE
      - BROWN_CANDLE
      - GREEN_CANDLE
      - RED_CANDLE
      - BLACK_CANDLE
  Crafting:
    Points: 2
    Materials:
      - CRAFTING_TABLE
  Bookshelf:
    Points: 2
    Materials:
      - BOOKSHELF
      - CHISELED_BOOKSHELF
  FlowerPot:
    Points: 1
    PrefixMatch: "POTTED_"
  Jukebox:
    Points: 2
    Materials:
      - JUKEBOX
  BrewingStand:
    Points: 1
    Materials:
      - BREWING_STAND
  DecoratedPot:
