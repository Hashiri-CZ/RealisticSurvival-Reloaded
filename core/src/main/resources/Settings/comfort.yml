  Anvil:
    Points: 1
    Materials:
      - ANVIL
      - CHIPPED_ANVIL
      - DAMAGED_ANVIL
  Lantern:
    Points: 1
    Materials:
      - LANTERN
      - SOUL_LANTERN
  Painting:
    Points: 1
    EntityTypes:
      - PAINTING
  ArmorStand:
    Points: 1
    EntityTypes:
      - ARMOR_STAND
  ItemFrame:
    Points: 1
    EntityTypes:
      - ITEM_FRAME
      - GLOW_ITEM_FRAME
  Loom:
    Points: 1
    Materials:
      - LOOM
  Barrel:
    Points: 1
    Materials:
      - BARREL

# ── Tiers ────────────────────────────────────────────────────
# Score ranges (inclusive). Duration is in ticks (20 ticks = 1 second).
# Effects use Bukkit PotionEffectType names (lowercase for Registry lookup).
Tiers:
  SHELTER:
    MinScore: 2
    MaxScore: 5
    Duration: 6000
    Effects:
      regeneration: 0
  HOME:
    MinScore: 6
    MaxScore: 10
    Duration: 12000
    Effects:
      regeneration: 0
      resistance: 0
  COZY:
    MinScore: 11
    MaxScore: 16
    Duration: 18000
    Effects:
      regeneration: 0
      resistance: 0
      saturation: 0
  LUXURY:
    MinScore: 17
    MaxScore: 999
    Duration: 24000
    Effects:
      regeneration: 1
      resistance: 0
      saturation: 0

# Diminishing returns on stacking the same category. Each extra match in a
# category contributes a decreasing fraction of its base Points.
# Example with base=3 (bed) and factor=0.5: 1st bed = 3, 2nd = 1.5, 3rd = 0.75, etc.
# Set Factor to 1.0 to disable (each match gives full Points).
DiminishingReturns:
  Enabled: true
  Factor: 0.5
  # Cap total contribution from any single category at this multiple of its base Points.
  # Cap=2.0 means "at most 2× the base Points from one category", regardless of count.
  Cap: 2.0

# ── Cabin Fever ─────────────────────────────────────────────
# Players who stay indoors too long suffer escalating debuffs.
# Inspired by The Long Dark's cabin fever mechanic.
CabinFever:
  Enabled: true
  CheckIntervalTicks: 600
  RoofCheckHeight: 4
  # When true, only player-placed (man-made) blocks above count as "indoors".
  # Blocks in NaturalRoofBlocks are ignored when scanning upward.
  # Set to false to restore pre-1.3.1 behaviour (any block counts as roof).
  RequireMaterialRoof: true
  NaturalRoofBlocks:
    - "Tag.LEAVES"
    - "VINE"
    - "GLOW_LICHEN"
    - "SNOW"
    - "MANGROVE_ROOTS"
  ExemptEnvironments:
    - NETHER
    - THE_END
  OutdoorResetTicks: 6000
  Thresholds:
    Restless: 48000
    Risk: 72000
    Full: 96000
  ComfortDelayTicks: 24000
  CureTicks: 24000
  Effects:
    SpeedPenalty: -0.05
    Nausea:
      RiskIntervalTicks: 6000
      FullIntervalTicks: 2400
      DurationTicks: 40
    FullEffects:
      weakness: 0
      mining_fatigue: 0
    ThirstExhaustionMultiplier: 1.3
  ResetOnDeath: false
  # Deprecated: Use /hl debug Comfort.CabinFever instead. This flag is ignored.
  Debug: false
