#######################################
#                Fear                 #
#######################################

ConfigId: "1.2.16-RELEASE" # Used for config syncing purposes, do NOT edit

# Customize messages
Initialize:
  Enabled: true
  Message: "&6[Harshlands] &fInitializing &e%NAME% &fmodule" # All placeholders: %NAME%
Shutdown:
  Enabled: true
  Message: "&6[Harshlands] &fShutting down &e%NAME% &fmodule" # All placeholders: %NAME%

TorchSystem:
  Enabled: true
  RemoveVanillaTorchRecipe: true
  BurnDurationMinutes: 60 # IRL minutes before a lit torch burns out and becomes an Unlit Torch again
  # WARNING: Advanced performance tuning for managed Unlit Torch enforcement.
  # DO NOT TOUCH if you do not know what you are doing.
  # Unlit torch enforcement is primarily event-driven (ChunkLoadEvent, BlockPhysicsEvent, BlockRedstoneEvent).
  # The periodic task below is a fallback only — it covers edge cases not caught by events.
  # Lower EnforcePeriodTicks = more frequent fallback sweeps (more CPU).
  # Lower TargetFullScanTicks = faster full sweep per fallback pass (more CPU).
  # Higher MinScanBatchSize = more torches checked per fallback invocation (more CPU floor).
  UnlitTorchEnforcement:
    EnforcePeriodTicks: 20    # Ticks between periodic fallback scans (20 = 1 second)
    TargetFullScanTicks: 200  # Ticks to complete a full sweep of all managed torches
    MinScanBatchSize: 5       # Minimum torches checked per periodic scan invocation

FearMeter:
  Enabled: true
  DefaultFear: 0.0
  CheckIntervalTicks: 100
  # Deprecated: Use /hl debug Fear.FearMeter instead. This flag is ignored.
  Debug: false

  PassiveDecay:
    Enabled: true
    Rate: 0.5     # fear units removed per check interval when no net gain

  Conditions:
    Darkness:
      Enabled: true
      MaxLightLevel: 4   # 0-15: trigger when block light at feet is this or lower
      Rate: 1.0          # fear added per check interval

    Cave:
      Enabled: true
      Rate: 0.4          # underground (no sky light at eye level)

    AloneUnderground:
      Enabled: true
      SearchRadius: 20.0 # blocks radius to look for other players
      Rate: 0.5

    LowHealth:
      Enabled: true
      HealthFraction: 0.35  # trigger below this fraction of max health (0.35 = 35%)
      RequiredTicks: 3      # consecutive check intervals at low health before fear starts
      Rate: 1.0

    NearbyEnemies:
      Enabled: true
      SearchRadius: 16.0
      Rate: 0.5            # fear per mob per check interval
      MaxMobBonus: 3.0     # cap on total fear from this condition

    Cold:
      Enabled: true
      TemperatureThreshold: 5.0  # TAN temperature value (range 0.0-25.0)
      Rate: 0.8

    Storm:
      Enabled: true
      RequireOutdoors: true      # only when exposed to sky
      Rate: 0.3

    Night:
      Enabled: true
      StartTime: 13000           # world time (0-24000)
      EndTime: 23000
      Rate: 0.5

    Malnourished:
      Enabled: true
      Threshold: 30.0
      Amount: 3.0

  Reductions:
    BrightLight:
      Enabled: true
      MinLightLevel: 12  # 0-15: trigger when block light at feet is this or higher
      Rate: 0.8          # fear removed per check interval

    NearFireSource:
      Enabled: true
      SearchRadius: 5    # block radius (cube) to scan for fire sources
      Rate: 1.0          # fear removed per check interval if any fire source found

    NearCompanions:
      Enabled: true
      SearchRadius: 12.0 # blocks radius to search for other players / tamed wolves & cats
      Rate: 0.6          # fear removed per companion per check interval
      MaxBonus: 3.0      # cap on total fear reduction from companions

    EatCookedFood:
      Enabled: true
      Amount: 5.0        # fear removed immediately on eating
      Foods:
        - COOKED_BEEF
        - COOKED_CHICKEN
        - COOKED_COD
        - COOKED_MUTTON
        - COOKED_PORKCHOP
        - COOKED_RABBIT
        - COOKED_SALMON
        - BAKED_POTATO
        - BREAD

    Sleep:
      Enabled: true
      Amount: 10.0       # fear removed when player successfully enters a bed

    OnDeath:
      Enabled: true
      ResetTo: 0.0       # fear level set to this value on death

  EffectsIntervalTicks: 20  # how often (ticks) the effects task runs; 20 = once per second

  Increases:
    MonsterHit:
      Enabled: true
      Amount: 3.0          # fear added when hit by a monster or monster-fired projectile

    Burning:
      Enabled: true
      Amount: 2.0          # fear added per fire/lava damage event (FIRE, FIRE_TICK, LAVA)

  Effects:
    Shaking:
      Enabled: true
      MinFear: 60.0        # fear level (0-100) required to trigger
      Chance: 0.08         # probability per effects tick (0.0 = never, 1.0 = always)
      Duration: 60         # ticks of Nausea (60 = 3 seconds)

    ProjectileInaccuracy:
      Enabled: true
      MinFear: 40.0        # fear level below which there is no spread
      SpreadScale: 0.3     # max random velocity offset per axis at 100 fear (scales linearly)

    FakeMobSounds:
      Enabled: true
      MinFear: 50.0
      Chance: 0.05         # probability per effects tick
      MaxDistance: 20.0    # max blocks from player for the fake sound origin
      Volume: 1.0
      Pitch: 1.0
      Sounds:              # sound name: relative weight (higher = more common)
        ENTITY_CREEPER_PRIMED: 35
        ENTITY_CREEPER_HURT: 15
        ENTITY_SPIDER_AMBIENT: 18
        ENTITY_SKELETON_AMBIENT: 8
        ENTITY_ZOMBIE_AMBIENT: 8
        ENTITY_ENDERMAN_STARE: 5
        ENTITY_GHAST_AMBIENT: 4
        ENTITY_PHANTOM_AMBIENT: 4
        ENTITY_WITHER_AMBIENT: 3

    Heartbeat:
      Enabled: true
      MinFear: 85.0        # plays every effects tick above this threshold
      Volume: 0.6
      Pitch: 1.0

Nightmare:
  Enabled: true
  SpawnFearThreshold: 100.0    # fear level that triggers a spawn
  DespawnFearThreshold: 80.0   # fear level at or below which the Nightmare despawns
  SpawnRadius: 10.0            # blocks from player to spawn the Enderman
  MaxFollowDistance: 30.0      # blocks; Enderman teleports to player beyond this distance
  TeleportRadius: 4.0          # blocks from player to teleport to when catching up
  Scaling:
    Stage1:                    # from spawn until Stage2 threshold
      SpeedAmplifier: 0        # Speed I
    Stage2:
      AfterSeconds: 60
      SpeedAmplifier: 1        # Speed II
      StrengthAmplifier: 0     # Strength I
    Stage3:
      AfterSeconds: 120
      SpeedAmplifier: 2        # Speed III
      StrengthAmplifier: 1     # Strength II

CharacterOverrides:
  # All placeholders: %BRAIN%, %FEAR_BAR%, %ARROW%
  FearActionbar: "%FEAR_BAR%%ARROW%  "

  FearBrain: ""        # Default Unicode Value: \uXXXX  (brain glyph from sanitydim512.png)

  # Fear bar steps: FearBar0 = 0% fear, FearBar10 = 100% fear
  FearBar0:  "\uE840"        # 0%
  FearBar1:  "\uE841"        # 10%
  FearBar2:  "\uE841"        # 20%
  FearBar3:  "\uE842"        # 30%
  FearBar4:  "\uE843"        # 40%
  FearBar5:  "\uE844"        # 50%
  FearBar6:  "\uE845"        # 60%
  FearBar7:  "\uE846"        # 70%
  FearBar8:  "\uE847"        # 80%
  FearBar9:  "\uE848"        # 90%
  FearBar10: "\uE849"        # 100%

  FearArrowUp:     "\uE84B"  # fear increasing
  FearArrowDown:   "\uE84A"  # fear decreasing
  FearArrowStable: ""  # fear unchanged / first tick

SoundEcology:
  Enabled: true

  # Noise Attraction System — makes player actions attract nearby hostile mobs
  NoiseLevels:
    Mining: 32
    Sprinting: 16
    Walking: 8
    Sneaking: 2
    Combat: 48
    Bow: 40
    Placing: 12
    ChestDoor: 20
    Explosion: 80
    Shivering: 6

  MobResponse:
    BaseChance: 0.3
    MaxMobsPerEvent: 3
    MaxMobsPerCycle: 20
    CooldownTicks: 100
    MaxVerticalScanRadius: 24

  Decay:
    Seconds: 4

  Environment:
    CaveBonusMultiplier: 1.25
    WoolDampeningFactor: 0.5
    WoolThreshold: 3

  Integration:
    FearAmplification:
      Enabled: true
      MinFear: 50
      MaxMultiplier: 1.5
    ColdShivering:
      Enabled: true
      TemperatureThreshold: 4.0
      Chance: 0.3

  Feedback:
    Particles:
      Enabled: true
      MinRadiusToShow: 16
      ScanRadius: 20

  EvaluationIntervalTicks: 10
  MaxActiveNoiseEvents: 500

Recipes:
  glowstone_crystal:
    Enabled:
      Enabled_1_21_11: true
    Unlock: true
  torch:
    Enabled:
      Enabled_1_21_11: true
    Unlock: true
  unlit_torch:
    Enabled:
      Enabled_1_21_11: true
    Unlock: true
