ConfigId: "1.3.2-RELEASE"

FoodExpansion:
  Defaults:
    # Max value that keeps the player in NORMAL tier (no bonus hearts).
    # At >=60 players enter WELL_NOURISHED (+1 heart); at >=80 PEAK_NUTRITION (+2 hearts).
    Protein: 59.0
    Carbs: 59.0
    Fats: 59.0

  DeathPenalty:
    ResetValue: 50.0

  # Macro decay values are "units lost per macro-tick" (the module's internal tick
  # loop, currently one pass per minute of in-game time). Activity multipliers
  # below amplify decay when the player is active.
  Decay:
    Protein: 1.0  # units lost per minute of idle
    Carbs: 1.5    # units lost per minute of idle
    Fats: 0.5     # units lost per minute of idle

  Activity:
    ExhaustionThreshold: 4.0
    Sprinting: 1.5
    Mining: 1.2
    Fighting: 1.3
    Swimming: 1.4

  Comfort:
    Enabled: true
    MinTier: "HOME"
    AbsorptionBonus: 0.10

  Effects:
    WellNourished:
      Threshold: 60
      HydrationThreshold: 60
      MaxHealthBonus: 2.0
      SpeedMultiplier: 0.10
    PeakNutrition:
      Threshold: 80
      HydrationThreshold: 80
      MaxHealthBonus: 4.0
      SpeedMultiplier: 0.10
      AttackDamageBonus: 0.10
    Malnourished:
      Threshold: 30
      MiningSpeedReduction: 0.30
    SeverelyMalnourished:
      Threshold: 15
      AttackDamageReduction: 0.20
      SpeedReduction: 0.20
    Starving:
      DamagePerTick: 1.0
      DamageInterval: 80
      # When true, macro-starvation damage only applies if vanilla hunger is also
      # low (<= VanillaHungerThreshold). Prevents "full hunger bar, dying anyway"
      # confusion. When macros are starving but vanilla hunger is high, an action-bar
      # warning fires instead.
      RequireVanillaHungerLow: true
      VanillaHungerThreshold: 4

  DefaultFood:
    Protein: 2.0
    Carbs: 2.0
    Fats: 1.0

  HUD:
    LowThreshold: 40
    LingerSeconds: 5
    # Horizontal offset (in pixels) from the bossbar's centered anchor for the icon group's visual center.
    IconCenterX: 0
    # Per-icon glyph advance in pixels; must match the resource pack font bitmap width.
    IconWidth: 32
    # Horizontal gap (pixels) inserted between adjacent icons. Set to 0 for flush-packed icons.
    IconSpacing: 16
    Preview:
      # Master switch. When false, holding food never triggers the preview and
      # the low-warning icons behave as they did before this feature.
      Enabled: true
      # Poll interval in ticks (1 tick = 50ms). 10 = 0.5s. Lower = snappier,
      # higher = less work per player.
      RefreshTicks: 10
      # Horizontal gap in pixels between macro cells (Protein | Carbs | Fat).
      CellSpacing: 24

