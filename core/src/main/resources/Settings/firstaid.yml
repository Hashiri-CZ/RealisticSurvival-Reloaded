#######################################
#          First Aid                  #
#######################################

ConfigId: "1.3.2-RELEASE" # Used for config syncing purposes, do NOT edit

# Customize messages
Initialize:
  Enabled: true
Shutdown:
  Enabled: true

BodyParts:
  # ─── Severity threshold behaviour ───────────────────────────────────────
  # Each body part can define Symptom1 and Symptom2 blocks. Both are applied
  # whenever the part's HP is AT OR BELOW the block's RequiredHealth value.
  # As HP drops, higher-threshold symptoms trigger first and lower-threshold
  # symptoms stack on top — so a part at 0 HP typically has both Symptom1
  # and Symptom2 active simultaneously. This is intentional.
  # ────────────────────────────────────────────────────────────────────────
  AbsorptionHealthBoost: # Decides how extra health from absorption or health boost will be distributed
    Priority: # Body parts at the top of list will receive health first, followed by the parts below
      - "HEAD" # Parts can be removed from the list if you don't want them to receive boosts
      - "CHEST"
      - "LEFT_LEG"
      - "RIGHT_LEG"
      - "LEFT_FOOT"
      - "RIGHT_FOOT"
      - "LEFT_ARM"
      - "RIGHT_ARM"
  Legs:
    IsLethal: false # If true, the player will die if both their left and right leg healths reach 0
    LeftLeg:
      Health: 6.0 # Determines health allocated to the body part (Conversion rate: 1.0 = half a heart)
      IsLethal: false # If true, the player will die if their left leg health reaches 0
      Symptoms: # Adds status effects to the player if their health gets too low
        Symptom1: # Multiple symptoms can be added
          RequiredHealth: 0.0 # Any health less than or equal to this will trigger effect
          Effects:
            SLOWNESS: # Effect types follow Spigot naming: https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/potion/PotionEffectType.html
              Amplifier: 0 # Amplifiers - Strength of potion effect (0 = Slowness I, 1 = Slowness II, etc.)
              Duration: 270 # Duration - Length of the potion effect in ticks (20 ticks = 1 second)
        Symptom2:
          RequiredHealth: 1.0
          Effects:
            SLOWNESS:
              Amplifier: 0
              Duration: 120
    RightLeg:
      Health: 6.0
      Symptoms:
        Symptom1:
          RequiredHealth: 0.0
          Effects:
            SLOWNESS:
              Amplifier: 0
              Duration: 270
        Symptom2:
          RequiredHealth: 1.0
          Effects:
            SLOWNESS:
              Amplifier: 0
              Duration: 120
    Symptoms:
      Symptom1:
        RequiredHealth: 0.0 # Acts like above, but adds health of left and right leg before comparing
        Effects:
          SLOWNESS:
            Amplifier: 1
            Duration: 270
      Symptom2:
        RequiredHealth: 1.0
        Effects:
          SLOWNESS:
            Amplifier: 1
            Duration: 120
  Arms:
    IsLethal: false
    LeftArm:
      Health: 6.0
      IsLethal: false
      Symptoms:
        Symptom1:
          RequiredHealth: 0.0
          Effects:
            MINING_FATIGUE:
              Amplifier: 0
              Duration: 270
        Symptom2:
          RequiredHealth: 1.0
          Effects:
            MINING_FATIGUE:
              Amplifier: 0
              Duration: 120
    RightArm:
      Health: 6.0
      IsLethal: false
      Symptoms:
        Symptom1:
          RequiredHealth: 0.0
          Effects:
            MINING_FATIGUE:
              Amplifier: 0
              Duration: 270
        Symptom2:
          RequiredHealth: 1.0
          Effects:
            MINING_FATIGUE:
              Amplifier: 0
              Duration: 120
    Symptoms:
      Symptom1:
        RequiredHealth: 0.0
        Effects:
          MINING_FATIGUE:
            Amplifier: 1
            Duration: 270
      Symptom2:
        RequiredHealth: 2.0
        Effects:
          MINING_FATIGUE:
            Amplifier: 0
            Duration: 120
  Feet:
    IsLethal: false
    LeftFoot:
      IsLethal: false
      Health: 6.0
      Symptoms:
        Symptom1:
          RequiredHealth: 0.0
          Effects:
            SLOWNESS:
              Amplifier: 0
              Duration: 270
        Symptom2:
          RequiredHealth: 1.0
          Effects:
            SLOWNESS:
              Amplifier: 0
              Duration: 120
    RightFoot:
      Health: 6.0
      IsLethal: false
      Symptoms:
        Symptom1:
          RequiredHealth: 0.0
          Effects:
            SLOWNESS:
              Amplifier: 0
              Duration: 270
        Symptom2:
          RequiredHealth: 1.0
          Effects:
            SLOWNESS:
              Amplifier: 0
              Duration: 120
    Symptoms:
      Symptom1:
        RequiredHealth: 0.0
        Effects:
          SLOWNESS:
            Amplifier: 1
            Duration: 270
      Symptom2:
        RequiredHealth: 2.0
        Effects:
          SLOWNESS:
            Amplifier: 0
            Duration: 120
  Head:
    Health: 6.0
    IsLethal: true
    Symptoms:
      Symptom1:
        RequiredHealth: 1.0
        Effects:
          BLINDNESS:
            Amplifier: 1
            Duration: 270
          NAUSEA:
            Amplifier: 0
            Duration: 270
      Symptom2:
        RequiredHealth: 2.0
        Effects:
          NAUSEA:
            Amplifier: 0
            Duration: 270
  Torso:
    Health: 6.0
    IsLethal: true
    Symptoms:
      Symptom1:
        RequiredHealth: 1.0
        Effects:
          WEAKNESS:
            Amplifier: 1
            Duration: 270
          NAUSEA:
            Amplifier: 1
            Duration: 270
      Symptom2:
        RequiredHealth: 2.0
        Effects:
          WEAKNESS:
            Amplifier: 1
            Duration: 270

