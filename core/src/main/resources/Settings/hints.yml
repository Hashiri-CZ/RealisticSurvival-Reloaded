# Harshlands — Progressive Hints
# Controls which hints fire for new players learning the plugin's altered wood progression.

Enabled: true

Initialize:
  Enabled: true   # Log "Initializing Hints module" on startup

Hints:
  FIST_ON_LOG:
    Enabled: true
    CooldownSeconds: 30
    Sound: "BLOCK_NOTE_BLOCK_BASS"
  FIRST_FLINT_SHARD:
    Enabled: true
    Sound: "UI_TOAST_CHALLENGE_COMPLETE"
  FIRST_FLINT_HATCHET_CRAFTED:
    Enabled: true
    Sound: "UI_TOAST_CHALLENGE_COMPLETE"
  FIRST_LOG:
    Enabled: true
    Sound: "UI_TOAST_CHALLENGE_COMPLETE"
  FIRST_PLANK_AND_STICK:
    Enabled: true
    Sound: "UI_TOAST_CHALLENGE_COMPLETE"
  FIRST_SAW_CRAFTED:
    Enabled: true
    Sound: "UI_TOAST_CHALLENGE_COMPLETE"
  FIRST_COLD_EXPOSURE:
    Enabled: true
    Sound: "UI_TOAST_IN"
  FIRST_HEAT_EXPOSURE:
    Enabled: true
    Sound: "UI_TOAST_IN"
  FIRST_SHIVERING:
    Enabled: true
    CooldownSeconds: 120
    Sound: "ENTITY_PLAYER_HURT_FREEZE"
  FIRST_THIRST_WARNING:
    Enabled: true
    Sound: "BLOCK_WATER_AMBIENT"
  FIRST_PARASITE:
    Enabled: true
    CooldownSeconds: 300
    Sound: "ENTITY_SPIDER_AMBIENT"
  PARASITE_CURED:
    Enabled: true
    CooldownSeconds: 300
    Sound: "ENTITY_PLAYER_BURP"
