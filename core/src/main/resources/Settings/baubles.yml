  broken_heart:
    Enabled:
      Enabled_1_21_11: true
    Break: false # Should bauble disappear when it reaches 0 durability?
    PlayTotemEffect: true # If set to true, the vanilla totem of undying effect will play when the ability is activated
    SleepRepair:
      Enabled: true
      Enabled_1_21_11: true
      Duration: 1200 # How long the player must lay in bed for the bauble to repair in ticks
      Amount: 1
  # Length of the invincibility frame the cross necklace gives you in ticks (20 ticks = 1 second)
  # Vanilla i-frames are 10 ticks long
  cross_necklace:
    Enabled:
      Enabled_1_21_11: true
    InvFrameLength: 20
  wrath_pendant:
    Enabled:
      Enabled_1_21_11: true
    ExtraDamage: 2.0
    Effects:
      strength:
        AmplifierIncrement: 1
        Amplifier: 0
        Duration: 270
        MaxStackedAmplifier: 2
  pride_pendant:
    Enabled:
      Enabled_1_21_11: true
    # Pride pendants reflect incoming damage back to the attacker.
    # Stacks additively across multiple pendants, capped at 0.5 total.
    ReflectDamagePercent: 0.15
    Effects:
      resistance:
        AmplifierIncrement: 1
        Amplifier: 0
        Duration: 270
        MaxStackedAmplifier: 2
  gluttony_pendant:
    Enabled:
      Enabled_1_21_11: true
    # Gluttony pendants slowly restore hunger saturation and reduce hunger exhaustion drain.
    HungerExhaustionMultiplier: 0.75
    Effects:
      saturation:
        AmplifierIncrement: 0
        Amplifier: 0
        Duration: 270
        MaxStackedAmplifier: 0
  sin_pendant:
    Enabled:
      Enabled_1_21_11: true
    # Applies the effects of wrath, pride, and gluttony pendants combined.
    # Does not double-stack with wearing the individual pendants separately.
    CombinesAll: true
  golden_crown:
    Enabled:
      Enabled_1_21_11: true
    # Was 13.0 pre-1.3.1 — close to a full netherite set's armor value from a
    # single head slot. Scaled to 4.0 so it feels like a prestige hat, not godmode.
    Armor: 4.0
