#######################################
#          Baubles                    #
#######################################

ConfigId: "1.3.2-RELEASE" # Used for config syncing purposes, do NOT edit

# Customize messages
Initialize:
  Enabled: true
Shutdown:
  Enabled: true

# Customize any bauble items

WormholeInventory:
  Sound:
    Enabled: true
    Sound: "ITEM_CHORUS_FRUIT_TELEPORT"
    Volume: 0.5
    Pitch: 1.0

DropBaublesUponDeath:
  Enabled: true
  IgnoreKeepInventoryGamerule: false

Items:
  # MaxAmplifier - Maximum level of potion effect a player can have get with multiple potion rings
  # Amplifiers are 1 value stronger than they appear
  # Ex: An amplifier of 0 corresponds to Resistance I
  # Set to -1 to disable
  # Duration - Length of the potion effect in ticks (20 ticks = 1 second)
  # TickPeriod - How frequently potion rings update in ticks
  # Increase this number if you have performance issues with the plugin
  # Do not set below 1
  dragons_eye: # REQUIRES ICE AND FIRE TO BE ENABLED
    Enabled:
      Enabled_1_21_11: true
    TickPeriod: 20
    Effects:
      NIGHT_VISION:
        AmplifierIncrement: 0
        Amplifier: 0
        Duration: 430
      FIRE_RESISTANCE:
        AmplifierIncrement: 0
        Amplifier: 0
        Duration: 270
  poison_stone:
    Enabled:
      Enabled_1_21_11: true
    AttackDamageMultiplier: 1.5
    Effects:
      POISON:
        Amplifier: 1
        Duration: 270
  potion_ring:
    Enabled:
      Enabled_1_21_11: true
  potion_ring_resistance:
    Enabled:
      Enabled_1_21_11: true
    TickPeriod: 20
    Effects:
      resistance:
        AmplifierIncrement: 1
        Amplifier: 0
        Duration: 270
        # Cap on amplifier level reached by stacking multiple rings of this type.
        # 0 = Resistance I, 1 = II, 2 = III — so MaxStackedAmplifier: 2 means
        # "at most Resistance III regardless of how many rings you wear."
        MaxStackedAmplifier: 2
  potion_ring_regeneration:
    Enabled:
      Enabled_1_21_11: true
    TickPeriod: 20
    Effects:
      REGENERATION:
        AmplifierIncrement: 1
        Amplifier: 0
        Duration: 270
        MaxStackedAmplifier: 2
  potion_ring_haste:
    Enabled:
      Enabled_1_21_11: true
    TickPeriod: 20
    Effects:
      haste:
        AmplifierIncrement: 1
        Amplifier: 0
        Duration: 270
        MaxStackedAmplifier: 2
  potion_ring_strength:
    Enabled:
      Enabled_1_21_11: true
    TickPeriod: 20
    Effects:
      strength:
        AmplifierIncrement: 1
        Amplifier: 0
        Duration: 270
        MaxStackedAmplifier: 2
  potion_ring_speed:
    Enabled:
      Enabled_1_21_11: true
    TickPeriod: 20
    Effects:
      SPEED:
        AmplifierIncrement: 1
        Amplifier: 0
        Duration: 270
        MaxStackedAmplifier: 2
  potion_ring_jump_boost:
    Enabled:
      Enabled_1_21_11: true
    TickPeriod: 20
    Effects:
      jump_boost:
        AmplifierIncrement: 1
        Amplifier: 0
        Duration: 270
        MaxStackedAmplifier: 2
  ender_queens_crown:
    Enabled:
      Enabled_1_21_11: true
    TickPeriod: 20
    PreventEndermenAngering: true
    PreventFriendlyFireToAllies: true # Prevents allies from attacking each other if they have the same owner
    PreventFriendlyFireToPets: true # Prevents allies from attacking the owner's pets
    TransformRegularEndermen:
      Enabled: true
      MaxDistance: 15.0
    SummonEndermenAllies:
      Enabled: true
      Chance: 1.0 # Chance per "Delay" to spawn endermen allies
      Delay: 500
      MustTakeDamage: true # If set to true, allies can only spawn when a player takes damage; prevents allies from passively spawning when a player is at low health
      MaxHealthPercent: 0.5
      MinAmount: 1
      MaxAmount: 3
      # Hard cap on how many enderman allies can be alive at once per wearer.
      # New spawns are skipped if the wearer already has this many live allies,
      # preventing farm-the-tank-for-infinite-endermen exploits.
      MaxConcurrentAllies: 5
    WaterContact:
      Enabled: true
      Chance: 1.0 # Chance per "Delay" to take damage when submerged in water
      Delay: 20
      Damage: 1.0
  sunglasses:
    Enabled:
      Enabled_1_21_11: true
  # MinFallDistance - The minimum distance a player can fall with a balloon without taking fall damage.
  # Vanilla minimum fall distance is 3 blocks
  # FallDamageMultiplier - How much is fall damage reduced
  # 1.0 = complete reduction of fall damage
  # JumpVelocityMultiplier - How much faster is jump speed
  # Avoid going too high otherwise the player will take damage just from landing
  balloon:
    Enabled:
      Enabled_1_21_11: true
    MinFallDistance: 8.0
    FallDamageMultiplier: 0.25
    JumpVelocityMultiplier: 2.0
  cobalt_shield:
    Enabled:
      Enabled_1_21_11: true
  # Should a player take fire, lava, or magma block damage, by how much is it reduced
  obsidian_skull:
