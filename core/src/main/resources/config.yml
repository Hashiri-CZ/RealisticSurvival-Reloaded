# ────────────────────────────────────────────────────────────────────────────
# Locale for user-facing messages. Maps to a folder under Translations/.
# Ship with "en-US"; admins can copy Translations/en-US/ to Translations/<code>/
# and translate to add a new language, then set Locale below.
# ────────────────────────────────────────────────────────────────────────────
Locale: "en-US"

##############################
#          Messages          #
##############################

RegisteredEnchant: "&7Registered &e%ENCHANT% &7enchant!" # All internal placeholders: %ENCHANT%
Integration: "&fDetected &e%PLUGIN%&f. Enabling integration!" # All internal placeholders: %PLUGIN%
CorrectVersion:
  - "&fYou are running the latest version"
OutdatedVersion:
  - "&cYou are running on an outdated version"
  - "&cUpdate to receive the latest features! https://github.com/Hashiri-CZ/Harshlands"
DeveloperBuildVersion:
  - "&eYou are running on a developer build"
  - "&eNote that there might be bugs or glitches! Please report any bugs, issues, or glitches"
  - "&ein the plugin support Discord server: https://discord.gg/2EkszXWxbE"

#######################################
#          Gameplay Features          #
#######################################

# Enable and disable features to your liking
# Set a feature to "false" to disable and "true" to enable
# Resource pack is disabled by default to allow for integration of it into
# your own custom server pack if needed
# NOTE: You must restart the server after enabling or disabling any feature
# NOTE: Supports Minecraft 1.21.11 and 26.1.2. Multiple resource pack URLs are supported (main + optional DynamicSurroundings pack).
ResourcePack:
  Enabled: true
  Url: "https://www.dropbox.com/scl/fi/l0p92sqrtmu9w4yb4qk8a/Harshlands_RP_1.3.0.zip?rlkey=byno1hto5uxyzbtloq0mh6y03&st=hlw6binq&dl=1"
  # Namespace used for minecraft:item_model keys on plugin items.
  # Use "realisticsurvival" for Realistic Survival RP and "harshlands" for Harshlands RP.
  # Change only if you have your own custom RP from Realistic Survival. If not, leave default.
  ModelNamespace: "harshlands"

AutomaticallyEnableWorlds: true # Will automatically enable modules for newly added worlds; if set to false, automatically disables modules for newly added worlds
AutoUpdateConfig: true # If set to true, will automatically update config; note that this may cause issues with porting across large updates

NoTreePunching:
  Enabled: true
  Worlds:
    world: true
    world_nether: true
    world_the_end: true
Baubles:
  Enabled: true
  Worlds:
    world: true
    world_nether: true
    world_the_end: true
SpartanWeaponry:
  Enabled: true
  Worlds:
    world: true
    world_nether: true
    world_the_end: true
SpartanandFire:
  Enabled: true # Spartan Weaponry and Ice and Fire must be set to true if enabled
  Worlds:
    world: true
    world_nether: true
    world_the_end: true
IceandFire:
  Enabled: true
  Worlds:
    world: true
    world_nether: true
    world_the_end: true
ToughAsNails:
  Enabled: true
  Worlds:
    world: true
    world_nether: true
    world_the_end: true
FirstAid:
  Enabled: true
  Worlds:
    world: true
    world_nether: true
    world_the_end: true
Fear:
  Enabled: true
  Worlds:
    world: true
    world_nether: true
    world_the_end: true
FoodExpansion:
  Enabled: true
  Worlds:
    world: true
    world_nether: true
    world_the_end: true
Hints:
  Enabled: true
  Worlds:
    world: true
    world_nether: true
    world_the_end: true
Guide:
  Enabled: true
  Worlds:
    world: true
    world_nether: true
    world_the_end: true
DynamicSurroundings:
  Enabled: false   # optional module — admin must explicitly opt in
  ResourcePack:
    Url: "https://www.dropbox.com/scl/fi/lidu0c909jvlxgre3botm/HarshlandsSounds_RP_1.2.16.zip?rlkey=e1i2wcsevwswvclv9wehf1gth&st=uqzir0ds&dl=1"  # URL of the Dynamic Surroundings sounds resource pack. Leave empty to disable.
  Worlds:
    world: true
    world_nether: true
    world_the_end: true

####################################
#          Miscellaneous           #
####################################

Database:
  Type: "H2"           # H2 (embedded, default) or MYSQL
  MySQL:
    Host: "localhost"
    Port: 3306
    Database: "harshlands"
    Username: "root"
    Password: ""
    Pool:
      MaximumPoolSize: 10
      MinimumIdle: 2
      ConnectionTimeout: 30000
      IdleTimeout: 600000
      MaxLifetime: 1800000

Performance:
  AsyncThreadPoolSize: 2    # Threads for DB I/O and heavy computation

# Bossbar sentry — keeps Harshlands' invisible HUD anchor at the bottom of the
# client's bossbar stack so foreign plugins' bossbars render in their natural
# Mojang positions.
#   AUTO     — install unless BetterHud / Nova / NovaFramework / Folia is detected
#   ENABLED  — install unconditionally (you accept conflict risk with HUD plugins)
#   DISABLED — never install (HUD remains screen-pinned via shader only)
BossBar:
  SentryMode: AUTO

BStats: true # Do you want non-confidential server data to be recorded for my use?
ConfigId: "1.3.2-RELEASE" # Used for config syncing purposes, do NOT edit
