#######################################
#          Gameplay Features          #
#######################################

# Enable and disable features to your liking
# Set a feature to "false" to disable and "true" to enable
# Resource pack is disabled by default to allow for integration of it into
# your own custom server pack if needed
# NOTE: You must restart the server after enabling or disabling any feature
# NOTE: This plugin supports Minecraft version 1.21.11 only and supports multiple resource pack URLs (main + optional DynamicSurroundings pack).
ResourcePack:
  Enabled: true
  Url: "https://www.dropbox.com/scl/fi/6tiban5555oc2l57e9t8m/Harshlands_RP_1.3.0.zip?rlkey=0uspkdf16gsk1ufk7r8i5126t&st=kicz92si&dl=1"
  # Namespace used for minecraft:item_model keys on plugin items.
  # Use "realisticsurvival" for Realistic Survival RP and "harshlands" for Harshlands RP.
  # Change only if you have your own custom RP from Realistic Survival. If not, leave default.
  ModelNamespace: "harshlands"

AutomaticallyEnableWorlds: true # Will automatically enable modules for newly added worlds; if set to false, automatically disables modules for newly added worlds
AutoUpdateConfig: true # If set to true, will automatically update config; note that this may cause issues with porting across large updates

NoTreePunching:
  Enabled: true
  Worlds:
    world: true
    world_nether: true
    world_the_end: true
Baubles:
  Enabled: true
  Worlds:
    world: true
    world_nether: true
    world_the_end: true
SpartanWeaponry:
  Enabled: true
  Worlds:
    world: true
    world_nether: true
    world_the_end: true
SpartanandFire:
  Enabled: true # Spartan Weaponry and Ice and Fire must be set to true if enabled
  Worlds:
    world: true
    world_nether: true
    world_the_end: true
IceandFire:
  Enabled: true
  Worlds:
    world: true
    world_nether: true
    world_the_end: true
ToughAsNails:
  Enabled: true
  Worlds:
    world: true
    world_nether: true
    world_the_end: true
FirstAid:
  Enabled: true
  Worlds:
    world: true
    world_nether: true
    world_the_end: true
Fear:
  Enabled: true
  Worlds:
    world: true
    world_nether: true
    world_the_end: true
DynamicSurroundings:
  Enabled: false   # optional module — admin must explicitly opt in
  ResourcePack:
    Url: "https://www.dropbox.com/scl/fi/lidu0c909jvlxgre3botm/HarshlandsSounds_RP_1.2.16.zip?rlkey=e1i2wcsevwswvclv9wehf1gth&st=uqzir0ds&dl=1"  # URL of the Dynamic Surroundings sounds resource pack. Leave empty to disable.
  Worlds:
    world: true
    world_nether: true
    world_the_end: true

####################################
#          Miscellaneous           #
####################################

Database:
  Type: "H2"           # H2 (embedded, default) or MYSQL
  MySQL:
    Host: "localhost"
    Port: 3306
    Database: "harshlands"
    Username: "root"
    Password: ""
    Pool:
      MaximumPoolSize: 10
      MinimumIdle: 2
      ConnectionTimeout: 30000
      IdleTimeout: 600000
      MaxLifetime: 1800000

Performance:
  AsyncThreadPoolSize: 2    # Threads for DB I/O and heavy computation

BStats: true # Do you want non-confidential server data to be recorded for my use?
ConfigId: "1.2.16-RELEASE" # Used for config syncing purposes, do NOT edit
