#######################################
#          Gameplay Features          #
#######################################

# Enable and disable features to your liking
# Set a feature to "false" to disable and "true" to enable
# Resource pack is disabled by default to allow for integration of it into
# your own custom server pack if needed
# NOTE: You must restart the server after enabling or disabling any feature
# NOTE: This plugin supports Minecraft version 1.21.11 only and uses a single resource pack URL.
ResourcePack:
  Enabled: true
  Url: "https://www.dropbox.com/scl/fi/ecwxcwr8oh8s39rpdjtuf/Realistic-Survival-RP-1.21.11.zip?rlkey=05ob7t202o8zq8a37jgk0kgjj&st=6yem10h8&dl=1"

AutomaticallyEnableWorlds: true # Will automatically enable modules for newly added worlds; if set to false, automatically disables modules for newly added worlds
AutoUpdateConfig: true # If set to true, will automatically update config; note that this may cause issues with porting across large updates

NoTreePunching:
  Enabled: true
  Worlds:
    world: true
    world_nether: true
    world_the_end: true
Baubles:
  Enabled: true
  Worlds:
    world: true
    world_nether: true
    world_the_end: true
SpartanWeaponry:
  Enabled: true
  Worlds:
    world: true
    world_nether: true
    world_the_end: true
SpartanandFire:
  Enabled: true # Spartan Weaponry and Ice and Fire must be set to true if enabled
  Worlds:
    world: true
    world_nether: true
    world_the_end: true
IceandFire:
  Enabled: true
  Worlds:
    world: true
    world_nether: true
    world_the_end: true
ToughAsNails:
  Enabled: true
  Worlds:
    world: true
    world_nether: true
    world_the_end: true
FirstAid:
  Enabled: true
  Worlds:
    world: true
    world_nether: true
    world_the_end: true
Fear:
  Enabled: true
  Worlds:
    world: true
    world_nether: true
    world_the_end: true

####################################
#          Miscellaneous           #
####################################

Database:
  Type: "H2"           # H2 (embedded, default) or MYSQL
  MySQL:
    Host: "localhost"
    Port: 3306
    Database: "harshlands"
    Username: "root"
    Password: ""
    Pool:
      MaximumPoolSize: 10
      MinimumIdle: 2
      ConnectionTimeout: 30000
      IdleTimeout: 600000
      MaxLifetime: 1800000

Performance:
  AsyncThreadPoolSize: 2    # Threads for DB I/O and heavy computation

BStats: true # Do you want non-confidential server data to be recorded for my use?
ConfigId: "1.2.10-RELEASE" # Used for config syncing purposes, do NOT edit

