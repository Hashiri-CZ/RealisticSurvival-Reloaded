hints:
  initialize:
    message: "&fInitializing %name% module"
  shutdown:
    message: "&fShutting down %name% module"
  Prefix: "&f[&5Harshlands&f] &7» &f"
  # Click hint (shown as hover over every item tag in a hint message)
  ClickHint: "&7Click for obtain instructions"
  # Styling for the clickable item tag. %name% is the pretty item name.
  ItemTag: "&e%name%"
  Hints:
    FistOnLog: "You need an %item_axe% to harvest %item_log%s. Craft a %item_flint_hatchet% (%item_flint_shard% + %item_plant_string% + %item_stick%)."
    FirstFlintShard: "Combine %item_flint_shard%s with %item_plant_string% and a %item_stick% to craft a %item_flint_hatchet%."
    FirstFlintHatchetCrafted: "Hold your %item_flint_hatchet% &fto break %item_log%s. Right-click upward on a %item_log% for a chance to split %item_plank%s."
    FirstLog: "Right-click upward on a %item_log% with your %item_axe% for a chance to drop %item_plank%s. Right-click %item_plank%s for %item_stick%s."
    FirstPlankAndStick: "Craft a %item_saw% &ffor guaranteed output. In the crafting table: saw + log = 4 planks, saw + planks = 4 sticks."
    FirstSawCrafted: "Place the %item_saw% with a %item_log% in the crafting grid for 4 %item_plank%s. With %item_plank%s for 4 %item_stick%s."
    FirstColdExposure: "&bYour body is losing heat. &fFind shelter, stand near a %item_campfire%, or craft warmer armour before it kills you."
    FirstHeatExposure: "&6You're overheating. &fGet into shade or water. %item_jelled_slime% armour and soul fire blocks cool you down."
    FirstShivering: "&bYou're shivering — mobs can hear it. &fWarm up or move carefully."
    FirstThirstWarning: "&bYour throat is dry. &fWater source blocks and canteens quench thirst — but beware, untreated water can make you sick."
    FirstParasite: "&cYou feel cramps. &fSomething was in that water. Drink %item_purified_water_bottle% or wait it out."
    ParasiteCured: "&aYour stomach settles. The parasites are gone."
    FirstMacroLow: "&cOne of your macros is low. &fCheck &e/hl nutrition&f. Eat different foods — protein, carbs, and fats each matter."
    FirstWellNourished: "&aYou're well nourished. &fExtra hearts and a little extra speed as long as you eat varied meals."
    FirstOvereating: "&7You're tired of that food. &fVary your diet or wait a few minutes before eating it again."
    FirstPetEaten: "&8A quiet guilt settles in. &7You ate something that had a name once."
    FirstBrokenLimb: "&cA body part is badly hurt. &fIt'll slow you until you patch it. Craft a %item_bandage% or %item_splint%."
    FirstFearHigh: "&8The dark is pressing in. &7Fear past half. Find light, a fire, or company before it summons something worse."
    FirstNightmare: "&8You hear it now. &7Something came for you. Run."
    FirstBaubleEquipped: "&dBauble equipped. &fOpen your bauble bag with &e/hl obtain bauble_bag&f if you haven't crafted one yet."
    FirstComfortBuff: "&aResting paid off. &fSleep near more comfort items for stronger buffs."
    FirstCabinFever: "&8You're restless. &7Too long indoors. Go outside to settle your nerves."
  # Obtain instructions — shown on /hl obtain <item>, also previewed in hint hovers.
  # Each entry: Name (pretty display name) + Lines (multi-line description).
  # Lines may contain %item_<key>% placeholders — they render as clickable tags.
  Obtain:
    axe:
      Name: "Axe"
      Lines:
        - "&7Any axe works: wooden, stone, iron, diamond, netherite,"
        - "&7or the Harshlands %item_flint_hatchet%."
        - "&7Vanilla wood tools need %item_plank%s first, so the"
        - "&7%item_flint_hatchet% is your starter axe."
    flint_hatchet:
      Name: "Flint Hatchet"
      Lines:
        - "&7Craft in a crafting table:"
        - "&8  • &7%item_flint_shard%"
        - "&8  • &7%item_plant_string%"
        - "&8  • &7%item_stick%"
    flint_shard:
      Name: "Flint Shard"
      Lines:
        - "&7Hold %item_flint% in hand and left-click the top"
        - "&7face of a hard block (stone, gravel, sandstone, etc.)"
        - "&7to knap a shard off."
    flint:
      Name: "Flint"
      Lines:
        - "&7Break gravel — it sometimes drops a flint item"
        - "&7instead of the gravel block."
    plant_string:
      Name: "Plant String"
      Lines:
        - "&7Break tall grass while holding a %item_dagger%"
        - "&7or %item_knife% to gather %item_plant_fiber%."
        - "&7Combine 2 %item_plant_fiber%s in a crafting grid"
        - "&7to get plant string."
    plant_fiber:
      Name: "Plant Fiber"
      Lines:
        - "&7Break tall grass while holding a %item_dagger%"
        - "&7or %item_knife%."
    dagger:
      Name: "Dagger"
      Lines:
        - "&7Harshlands adds several tiered daggers"
        - "&7(flint, copper, iron, etc.)."
        - "&7Check the in-game recipe book for recipes."
    knife:
      Name: "Knife"
      Lines:
        - "&7Harshlands adds several tiered knives"
        - "&7(flint, copper, iron, etc.)."
        - "&7Check the in-game recipe book for recipes."
    stick:
      Name: "Stick"
      Lines:
        - "&7Hold an %item_axe% and right-click upward on a"
        - "&7%item_plank% block for a chance to split off a stick."
        - "&7A %item_saw% + planks in the crafting grid"
        - "&7gives guaranteed output."
    log:
      Name: "Log"
      Lines:
        - "&7Break any log with an %item_axe% in your hand."
        - "&7Bare fists break logs but drop nothing."
    plank:
      Name: "Plank"
      Lines:
        - "&7Hold an %item_axe% and right-click upward on a"
        - "&7%item_log% block for a chance to split off a plank."
        - "&7A %item_saw% + log in the crafting grid"
        - "&7gives guaranteed output (4 planks per log)."
    saw:
      Name: "Saw"
      Lines:
        - "&7Craft in a crafting table:"
        - "&8  • &7gold, iron, or diamond ingots"
        - "&8  • &7%item_stick%s"
        - "&7Place saw + %item_log% = 4 planks, saw + planks"
        - "&7= 4 sticks. Check the in-game recipe book."
    campfire:
      Name: "Campfire"
      Lines:
        - "&7Hold a %item_fire_starter% and right-click on"
        - "&7fuel + kindling items to build a campfire."
        - "&7Kindling = sticks, saplings, or string."
    jelled_slime:
      Name: "Jelled Slime"
      Lines:
        - "&7Craft from slime balls and ice."
        - "&7Wearing Jelled Slime armour keeps you cool."
    fire_starter:
      Name: "Fire Starter"
      Lines:
        - "&7Craft with an iron ingot and flint."
        - "&7Hold and right-click fuel + kindling stacks"
        - "&7within 1 block of each other to build a fire."
    purified_water_bottle:
      Name: "Purified Water Bottle"
      Lines:
        - "&7Combine a %item_charcoal_filter% with a glass bottle"
        - "&7of water to filter out parasites."
    charcoal_filter:
      Name: "Charcoal Filter"
      Lines:
        - "&7Craft 2 charcoal + 2 paper + a string."
        - "&7Used to purify water."
    canteen_empty:
      Name: "Canteen"
      Lines:
        - "&7Craft from iron ingots."
        - "&7Holds several drinks of water at once."
    bandage:
      Name: "Bandage"
      Lines:
        - "&7Craft from paper and string."
        - "&7Right-click to heal a damaged limb by 2 HP."
    splint:
      Name: "Splint"
      Lines:
        - "&7Craft from sticks and string (3x3 pattern)."
        - "&7Right-click to brace a broken leg for 4 HP."
    bauble_bag:
      Name: "Bauble Bag"
      Lines:
        - "&7Craft from leather + string."
        - "&7Right-click to open — shows the 6 bauble slots"
        - "&7(head, amulet, body, belt, charm, ring)."
    thermometer:
      Name: "Thermometer"
      Lines:
        - "&7Craft from iron ingots, glass, and redstone."
        - "&7Hold in hand to see your current temperature."
        - "&7Range 0-25; hypothermia starts near 1, hyperthermia near 24."
    medical_kit:
      Name: "Medical Kit"
      Lines:
        - "&7Craft from bandages, splints, and leather."
        - "&7Right-click to fully restore every body part."
        - "&7Consumed on use — reserve for emergencies."
  # Shown by /hl obtain when the item key is not recognised.
  UnknownItem: "&cUnknown item: &e%name%&c. Try one of: axe, flint_hatchet, flint_shard, flint, plant_string, plant_fiber, dagger, knife, stick, log, plank, saw, campfire, jelled_slime, fire_starter, purified_water_bottle, charcoal_filter, canteen_empty, bandage, splint, medical_kit, thermometer, bauble_bag."
