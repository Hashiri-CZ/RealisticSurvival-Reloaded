hints:
  initialize:
    message: "&fInitializing %name% module"
  shutdown:
    message: "&fShutting down %name% module"
  Prefix: "&f[&5Harshlands&f] &7» &f"
  # Click hint (shown as hover over every item tag in a hint message)
  ClickHint: "&7Click for obtain instructions"
  # Styling for the clickable item tag. %name% is the pretty item name.
  ItemTag: "&e%name%"
  Hints:
    FistOnLog: "You need an %item_axe% to harvest %item_log%s. Craft a %item_flint_hatchet% (%item_flint_shard% + %item_plant_string% + %item_stick%)."
    FirstFlintShard: "Combine %item_flint_shard%s with %item_plant_string% and a %item_stick% to craft a %item_flint_hatchet%."
    FirstFlintHatchetCrafted: "Hold your %item_flint_hatchet% &fto break %item_log%s. Right-click upward on a %item_log% for a chance to split %item_plank%s."
    FirstLog: "Right-click upward on a %item_log% with your %item_axe% for a chance to drop %item_plank%s. Right-click %item_plank%s for %item_stick%s."
    FirstPlankAndStick: "Craft a %item_saw% &ffor guaranteed output. In the crafting table: saw + log = 4 planks, saw + planks = 4 sticks."
    FirstSawCrafted: "Place the %item_saw% with a %item_log% in the crafting grid for 4 %item_plank%s. With %item_plank%s for 4 %item_stick%s."
  # Obtain instructions — shown on /hl obtain <item>, also previewed in hint hovers.
  # Each entry: Name (pretty display name) + Lines (multi-line description).
  # Lines may contain %item_<key>% placeholders — they render as clickable tags.
  Obtain:
    axe:
      Name: "Axe"
      Lines:
        - "&7Any axe works: wooden, stone, iron, diamond, netherite,"
        - "&7or the Harshlands %item_flint_hatchet%."
        - "&7Vanilla wood tools need %item_plank%s first, so the"
        - "&7%item_flint_hatchet% is your starter axe."
    flint_hatchet:
      Name: "Flint Hatchet"
      Lines:
        - "&7Craft in a crafting table:"
        - "&8  • &7%item_flint_shard%"
        - "&8  • &7%item_plant_string%"
        - "&8  • &7%item_stick%"
    flint_shard:
      Name: "Flint Shard"
      Lines:
        - "&7Hold %item_flint% in hand and left-click the top"
        - "&7face of a hard block (stone, gravel, sandstone, etc.)"
        - "&7to knap a shard off."
    flint:
      Name: "Flint"
      Lines:
        - "&7Break gravel — it sometimes drops a flint item"
        - "&7instead of the gravel block."
    plant_string:
      Name: "Plant String"
      Lines:
        - "&7Break tall grass while holding a %item_dagger%"
        - "&7or %item_knife% to gather %item_plant_fiber%."
        - "&7Combine 2 %item_plant_fiber%s in a crafting grid"
        - "&7to get plant string."
    plant_fiber:
      Name: "Plant Fiber"
      Lines:
        - "&7Break tall grass while holding a %item_dagger%"
        - "&7or %item_knife%."
    dagger:
      Name: "Dagger"
      Lines:
        - "&7Harshlands adds several tiered daggers"
        - "&7(flint, copper, iron, etc.)."
        - "&7Check the in-game recipe book for recipes."
    knife:
      Name: "Knife"
      Lines:
        - "&7Harshlands adds several tiered knives"
        - "&7(flint, copper, iron, etc.)."
        - "&7Check the in-game recipe book for recipes."
    stick:
      Name: "Stick"
      Lines:
        - "&7Hold an %item_axe% and right-click upward on a"
        - "&7%item_plank% block for a chance to split off a stick."
        - "&7A %item_saw% + planks in the crafting grid"
        - "&7gives guaranteed output."
    log:
      Name: "Log"
      Lines:
        - "&7Break any log with an %item_axe% in your hand."
        - "&7Bare fists break logs but drop nothing."
    plank:
      Name: "Plank"
      Lines:
        - "&7Hold an %item_axe% and right-click upward on a"
        - "&7%item_log% block for a chance to split off a plank."
        - "&7A %item_saw% + log in the crafting grid"
        - "&7gives guaranteed output (4 planks per log)."
    saw:
      Name: "Saw"
      Lines:
        - "&7Craft in a crafting table:"
        - "&8  • &7gold, iron, or diamond ingots"
        - "&8  • &7%item_stick%s"
        - "&7Place saw + %item_log% = 4 planks, saw + planks"
        - "&7= 4 sticks. Check the in-game recipe book."
  # Shown by /hl obtain when the item key is not recognised.
  UnknownItem: "&cUnknown item: &e%name%&c. Try one of: axe, flint_hatchet, flint_shard, flint, plant_string, plant_fiber, dagger, knife, stick, log, plank, saw."
