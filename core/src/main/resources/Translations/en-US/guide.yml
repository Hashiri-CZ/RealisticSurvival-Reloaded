  Chapters:
    axe:
      - |
        &5&lThe Axe

        &8Fists can't fell
        &8an oak.

        &0Craft a
        &0%item_flint_hatchet%:
        &0+ %item_flint_shard%
        &0+ %item_plant_string%
      - |
        &5&lThe Axe &7(2/2)

        &0Use the hatchet
        &0on %item_log%s.

        &0Right-click up
        &0for %item_plank%s.

        &0Craft a %item_saw%
        &0for guaranteed
        &0yields.
    nutrition:
      - |
        &5&lFood

        &8Hunger is three
        &8numbers now.

        &0Protein, Carbs,
        &0Fats. Each drains.

        &0Eat varied meals.
      - |
        &5&lFood &7(2/3)

        &0Run &0&l/hl nutrition
        &0to see macros.

        &0Same food gets
        &0boring. Overeat
        &0= smaller refills.
      - |
        &5&lFood &7(3/3)

        &0All three macros
        &0high = &2Well
        &2Nourished&0: extra
        &0hearts and speed.

        &8A quiet guilt.
        &8You ate something
        &8that had a name.
    thirst:
      - |
        &5&lWater

        &8Water is finite.
        &8Drink wrong, it
        &8drinks you back.

        &0Right-click a
        &0source, or carry
        &0a %item_canteen_empty%.
      - |
        &5&lWater &7(2/2)

        &0Raw water brings
        &0parasites. Cramps
        &0and hurt for 30s.

        &0Use a
        &0%item_charcoal_filter%
        &0for a
        &0%item_purified_water_bottle%.
    fear:
      - |
        &5&lThe Dark

        &8Torches help.
        &8The dark bites.

        &0Fear grows in:
        &0- darkness
        &0- caves, alone
        &0- night, low HP
      - |
        &5&lThe Dark &7(2/3)

        &0Half-bar: arrows
        &0fly crooked.

        &0Full bar: it
        &0finds you. A
        &0Nightmare. Run.
      - |
        &5&lThe Dark &7(3/3)

        &0Lower Fear with:
        &0- %item_campfire%
        &0- cooked food
        &0- a safe bed

        &0Keep a
        &0%item_fire_starter%.
    temperature:
      - |
        &5&lCold & Heat

        &8The biome kills
        &8before mobs do.

        &0Cold freezes.
        &0Heat burns.
        &0Extremes damage.
      - |
        &5&lCold & Heat &7(2/2)

        &0Use a
        &0%item_thermometer%
        &0to check.

        &0Cold: a
        &0%item_campfire%,
        &0warm armour.
      - |
        &5&lCold & Heat &7(3/3)

        &0Hot: shade,
        &0water, and
        &0%item_jelled_slime%
        &0armour.

        &8Shivering is
        &8loud. Mobs hear.
    comfort:
      - |
        &5&lComfort

        &8Holes don't rest.

        &0Add decor near
        &0your bed:
        &0- chairs
        &0- bookshelves
        &0- paintings
        &0- a campfire.
      - |
        &5&lComfort &7(2/2)

        &0More comfort =
        &0longer resting
        &0buff after sleep.
    baubles:
      - |
        &5&lBaubles

        &8Six slots your
        &8armour misses.

        &0Head, Amulet,
        &0Body, Belt,
        &0Charm, Ring.
      - |
        &5&lBaubles &7(2/2)

        &0Craft a
        &0%item_bauble_bag%.
        &0Right-click to
        &0open the slots.

        &0Drop each bauble
        &0into its slot.
    creatures:
      - |
        &5&lBeware

        &8Most things want
        &8to eat you.

        &0Sea serpents
        &0drag divers down.

        &0Dragons roam:
        &0fire, ice, storm.
      - |
        &5&lBeware &7(2/2)

        &0Don't fight what
        &0you can't outrun
        &0by morning.

        &0Iron gear at
        &0minimum. Better
        &0yet, hide.
    ecology:
      - |
        &5&lSilence

        &8The cave hears
        &8you mine.

        &0Loud work pulls
        &0mobs:
        &0- mining
        &0- fighting
        &0- sprinting

        &0Sneak is quieter.
    commands:
      - |
        &5&lCommands

        &0&l/hl nutrition
        &0macros

        &0&l/hl fear
        &0fear level

        &0&l/hl comfort
        &0comfort tier
      - |
        &5&lCommands &7(2/2)

        &0&l/hl obtain
        &0<item> recipe

        &0&l/hl hints reset
        &0replay tips

        &0&l/hl guide
        &0reopen this book
