# ── Tiers ────────────────────────────────────────────────────
# Score ranges (inclusive). Duration is in ticks (20 ticks = 1 second).
# Effects use Bukkit PotionEffectType names (lowercase for Registry lookup).
Tiers:
  SHELTER:
    MinScore: 1
    MaxScore: 3
    Duration: 6000
    Effects:
      regeneration: 0
  HOME:
    MinScore: 4
    MaxScore: 6
    Duration: 12000
    Effects:
      regeneration: 0
      resistance: 0
  COZY:
    MinScore: 7
    MaxScore: 10
    Duration: 18000
    Effects:
      regeneration: 0
      resistance: 0
      saturation: 0
  LUXURY:
    MinScore: 11
    MaxScore: 999
    Duration: 24000
    Effects:
      regeneration: 1
      resistance: 0
      saturation: 0

# ── Messages ─────────────────────────────────────────────────
Messages:
  NoComfort: "§7No comfort nearby."
  BuffApplied: "§aComfort: §f{score} §7({tier}) §a- Resting buff for {minutes}min"
  ComfortCheck: "§7Comfort Score: §f{score} §7({tier})"
  ComfortBreakdown: "§7Nearby: §f{categories}"
